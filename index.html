<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTimeManager · Project Board</title>
    <meta name="description" content="Plataforma colaborativa para gestionar el desarrollo de SmartTimeManager: 40 tareas, 4 devs, un objetivo.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Cursor glow effect -->
    <div class="cursor-glow" id="cursor-glow"></div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <div class="app-wrapper">

        <!-- ─────────── SIDEBAR ─────────── -->
        <aside class="sidebar" id="sidebar">

            <div class="sidebar-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                    <span class="logo-title">SmartTime</span>
                    <span class="logo-sub">Project Board</span>
                </div>
            </div>

            <!-- Global KPIs -->
            <div class="kpi-grid">
                <div class="kpi-card">
                    <span class="kpi-value" id="kpi-assigned">0</span>
                    <span class="kpi-label">Asignadas</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-value" id="kpi-completed">0</span>
                    <span class="kpi-label">Completadas</span>
                </div>
                <div class="kpi-card kpi-wide">
                    <span class="kpi-label">Progreso global</span>
                    <div class="progress-track">
                        <div class="progress-fill" id="global-progress"></div>
                    </div>
                    <span class="kpi-percent" id="global-percent">0%</span>
                </div>
            </div>

            <div class="sidebar-section-title">EQUIPO</div>

            <!-- Team members -->
            <div class="team-list" id="users-container"></div>

            <div class="sidebar-section-title" style="margin-top: auto; padding-top: 1.5rem;">LEYENDA</div>
            <div class="legend">
                <div class="legend-item"><span class="dot dot-easy"></span> Fácil</div>
                <div class="legend-item"><span class="dot dot-medium"></span> Media</div>
                <div class="legend-item"><span class="dot dot-hard"></span> Difícil</div>
                <div class="legend-item"><span class="dot dot-done"></span> Completada</div>
            </div>
        </aside>

        <!-- ─────────── MAIN ─────────── -->
        <main class="main-content">

            <!-- Top bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                        <span></span><span></span><span></span>
                    </button>
                    <div>
                        <h1 class="page-title">Sistema Adaptativo de Organización Personal</h1>
                        <p class="page-sub">React Native · Firebase · Node.js · IA Ligera</p>
                    </div>
                </div>
                <div class="topbar-right">
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="search-input" placeholder="Buscar tarea..." autocomplete="off">
                    </div>
                    <select id="filter-user" class="filter-select">
                        <option value="all">Todos</option>
                        <option>Bamba</option>
                        <option>Ruben</option>
                        <option>Oscar</option>
                        <option>Josias</option>
                    </select>
                    <select id="filter-status" class="filter-select">
                        <option value="all">Cualquier estado</option>
                        <option value="unassigned">Sin asignar</option>
                        <option value="assigned">Asignadas</option>
                        <option value="completed">Completadas</option>
                    </select>
                </div>
            </header>

            <!-- Block tabs -->
            <div class="block-tabs-bar">
                <button class="block-tab active" data-target="block-1" id="tab-b1">
                    <span class="tab-num">01</span>
                    <span class="tab-label">Fundamentos & CRUD</span>
                    <span class="tab-count" id="tab-count-1">20 tareas</span>
                </button>
                <button class="block-tab" data-target="block-2" id="tab-b2">
                    <span class="tab-num">02</span>
                    <span class="tab-label">IA, Notificaciones & Lanzamiento</span>
                    <span class="tab-count" id="tab-count-2">20 tareas</span>
                </button>
            </div>

            <!-- Task grids -->
            <div class="tasks-viewport">
                <div class="task-grid active" id="block-1"></div>
                <div class="task-grid" id="block-2"></div>

                <!-- Empty state -->
                <div class="empty-state" id="empty-state" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <p>No se encontraron tareas con ese filtro.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- ─────────── MODAL ─────────── -->
    <div class="modal-overlay" id="task-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-panel">

            <div class="modal-header">
                <div class="modal-meta">
                    <span class="modal-block-tag" id="modal-block-tag">Bloque 1</span>
                    <span class="badge" id="modal-difficulty"></span>
                    <span class="modal-task-id" id="modal-task-id">#01</span>
                </div>
                <h2 id="modal-title"></h2>
                <button class="modal-close" id="close-modal" aria-label="Cerrar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <div class="modal-body">
                <!-- Assignment Panel -->
                <div class="assignment-panel">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="assignee-select">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                Asignar a
                            </label>
                            <select id="assignee-select">
                                <option value="unassigned">— Sin asignar —</option>
                                <option value="Bamba">Bamba</option>
                                <option value="Ruben">Ruben</option>
                                <option value="Oscar">Oscar</option>
                                <option value="Josias">Josias</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="deadline-datetime">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                Plazo de entrega
                            </label>
                            <input type="datetime-local" id="deadline-datetime">
                        </div>
                        <div class="form-group">
                            <label for="status-select">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                                Estado
                            </label>
                            <select id="status-select">
                                <option value="pending">Pendiente</option>
                                <option value="in-progress">En progreso</option>
                                <option value="completed">Completada ✓</option>
                            </select>
                        </div>
                    </div>
                    <!-- Deadline urgency meter -->
                    <div class="deadline-info" id="deadline-info" style="display:none;"></div>
                </div>

                <!-- Task instructions -->
                <div class="instructions-body" id="modal-description"></div>
            </div>

            <div class="modal-footer">
                <div class="modal-footer-left" id="modal-assignee-preview"></div>
                <div class="modal-footer-right">
                    <button class="btn btn-ghost" id="close-modal-2">Cancelar</button>
                    <button class="btn btn-primary" id="save-task-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        Guardar cambios
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
